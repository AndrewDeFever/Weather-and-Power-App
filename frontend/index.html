<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather & Power Status</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <header class="topbar">
    <div class="container">
      <div class="header-row">
        <div class="brand" aria-label="ONE Gas">
          <div class="mark" title="ONE Gas symbol"></div>
          <div class="titlewrap">
            <div class="title">Weather &amp; Power Status</div>
            <div class="subtitle">Operational lookup (ETR-aware)</div>
          </div>
        </div>

        <div class="searchwrap">
          <div class="searchbar" role="search">
            <input
              id="q"
              class="input"
              type="text"
              inputmode="search"
              autocomplete="off"
              spellcheck="false"
              placeholder="Enter Site ID (e.g., TULSATEST, OKCTEST, DALLASTEST, KCKTEST)"
            />
            <button id="btn" class="btn" type="button">Search</button>
          </div>
        </div>

        <div class="rightmeta">
          <div class="pill" title="Request status">
            <span id="statusDot" class="dot"></span>
            <span id="statusText">Idle</span>
          </div>
        </div>
      </div>

      <div class="statusline">
        <span>Tip:</span>
        <span><strong>Enter</strong> submits. <strong>Esc</strong> clears.</span>
      </div>

      <div id="toast" class="toast" role="status"></div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="hgroup">
        <div>
          <h1 id="headline">No query loaded</h1>
          <p id="subhead" class="hint">Submit a Site ID or coordinates to retrieve weather and outage proximity.</p>
        </div>
      </div>

      <div class="grid" aria-live="polite">
        <!-- Summary Cards -->
        <section class="card" aria-label="Location summary">
          <div class="accentline"></div>
          <div class="label"><span class="dot ok"></span> Location</div>
          <div id="c_loc" class="value">—</div>
          <div id="c_loc_meta" class="meta">—</div>
        </section>

        <section class="card" aria-label="Provider summary">
          <div class="accentline"></div>
          <div class="label"><span class="dot ok"></span> Utility / Provider</div>
          <div id="c_util" class="value">—</div>
          <div id="c_util_meta" class="meta">—</div>
        </section>

        <section class="card" aria-label="Weather summary">
          <div class="accentline"></div>
          <div class="label"><span id="wxDot" class="dot live"></span> Weather</div>
          <div id="c_wx" class="value">—</div>
          <div id="c_wx_meta" class="meta">—</div>
        </section>

        <section class="card" aria-label="Power summary">
          <div class="accentline"></div>
          <div class="label"><span id="pwrDot" class="dot"></span> Power</div>
          <div id="c_pwr" class="value">—</div>
          <div id="c_pwr_meta" class="meta">—</div>
        </section>

        <!-- Details Panel -->
        <section class="panel" aria-label="Details">
          <div class="tabs" role="tablist" aria-label="Details tabs">
            <button class="tab active" role="tab" aria-selected="true" aria-controls="tab_overview" id="t_overview" type="button">Overview</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab_power" id="t_power" type="button">Power</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab_weather" id="t_weather" type="button">Weather</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab_raw" id="t_raw" type="button">Raw JSON</button>

            <div style="margin-left:auto"></div>
          </div>

          <div class="actions">
			<button id="openGoogleMaps" class="linkbtn" type="button" disabled>Open in Google Maps</button>
			<button id="openOutageMap" class="linkbtn" type="button" disabled>Open Outage Map</button>
			<button id="openNwsMap" class="linkbtn" type="button" disabled>Open Weather Map</button>
          </div>

          <div class="panel-body">
            <div id="tab_overview" role="tabpanel" aria-labelledby="t_overview">
              <div id="ov_kv"></div>
            </div>

            <div id="tab_power" role="tabpanel" aria-labelledby="t_power" hidden>
              <div id="pwr_kv"></div>
            </div>

            <div id="tab_weather" role="tabpanel" aria-labelledby="t_weather" hidden>
              <div id="wx_kv"></div>
            </div>

            <div id="tab_raw" role="tabpanel" aria-labelledby="t_raw" hidden>
              <pre id="raw">(no data)</pre>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
