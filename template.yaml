AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: NOC backend (FastAPI on Lambda)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 1024

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10

  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_handler.handler
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          EVERGY_LAYER: "cluster-1"
          EVERGY_LAYOUT: "flat"
          EVERGY_ZOOM: "11"
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
