name: Deploy Weather-and-Power App (SAM)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          aws configure list

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build --debug

      - name: SAM Validate
        run: sam validate

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name weather-power-status \
            --region us-east-1 \
            --s3-bucket weathernpowerapp \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --role-arn arn:aws:iam::042889969210:role/weather-power-status-cfn-exec \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --debug

      - name: Dump CloudFormation events on failure
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name weather-power-status \
            --max-items 50

      - name: Continue rollback only if needed
        if: failure()
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name weather-power-status --query "Stacks[0].StackStatus" --output text)
          echo "Current stack status: $STATUS"
          if [[ "$STATUS" == "UPDATE_ROLLBACK_FAILED" || "$STATUS" == "UPDATE_ROLLBACK_IN_PROGRESS" ]]; then
            aws cloudformation continue-update-rollback --stack-name weather-power-status
          else
            echo "No rollback action required."
          fi
      - name: Show stack status
        run: |
          aws cloudformation describe-stacks \
            --stack-name weather-power-status \
            --query "Stacks[0].StackStatus" \
            --output text || true

      - name: Tail recent stack events
        run: |
          aws cloudformation describe-stack-events \
            --stack-name weather-power-status \
            --max-items 30 \
            --query "StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]" \
            --output table || true
